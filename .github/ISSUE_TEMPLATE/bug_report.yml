name: "🐛 Bug report"
description: Report something that is broken or crashes
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please give a **minimal** repro when you can.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short one-liner of the problem
      placeholder: "Crash when calling client.listen().v1().v1WebSocket() from a thread"
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Tell us what you saw and what you expected instead
      placeholder: |
        Actual:
        - …

        Expected:
        - …
    validations:
      required: true

  - type: textarea
    id: repro_steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps; include inputs that matter (model, options, etc.)
      placeholder: |
        1. Add deepgram-java-sdk:0.0.1 to build.gradle
        2. Run the code below
        3. Observe error XYZ
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Minimal code sample
      description: Small, runnable example (trim secrets). Attach a gist/repo if easier.
      render: java
      placeholder: |
        DeepgramClient client = DeepgramClient.builder()
            .apiKey("your-key")
            .build();
        // minimal snippet here
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      description: Full stack trace or error message
      render: text
      placeholder: |
        Exception in thread "main" ...
            at ...
    validations:
      required: false

  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - HTTP
        - WebSocket
        - Both / Not sure
    validations:
      required: true

  - type: input
    id: endpoint
    attributes:
      label: API endpoint / path
      placeholder: "/v1/listen/…  or  /v1/speak/…"
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Model(s) used
      placeholder: "nova-3, aura-2-asteria-en, flux-general-en, etc."
    validations:
      required: false

  - type: dropdown
    id: repro_rate
    attributes:
      label: How often?
      options:
        - Always
        - Often
        - Sometimes
        - Rarely
        - Only once
    validations:
      required: true

  - type: checkboxes
    id: regression
    attributes:
      label: Is this a regression?
      options:
        - label: "Yes, it worked in an earlier version"
          required: false

  - type: input
    id: worked_version
    attributes:
      label: Last working SDK version (if known)
      placeholder: "0.0.1"
    validations:
      required: false

  - type: input
    id: sdk_version
    attributes:
      label: SDK version
      placeholder: "0.0.1"
    validations:
      required: true

  - type: input
    id: java_version
    attributes:
      label: Java version
      placeholder: "17.0.12"
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Install method
      options:
        - Gradle
        - Maven
        - From source
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: OS
      multiple: true
      options:
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Linux (x86_64)
        - Linux (arm64)
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: extra_env
    attributes:
      label: Environment details
      description: Anything else? Docker, Spring Boot, Android, corporate network, etc.
      render: text
    validations:
      required: false

  - type: input
    id: repro_repo
    attributes:
      label: Link to minimal repro (optional)
      placeholder: "https://github.com/yourname/repro"
    validations:
      required: false

  - type: input
    id: session_id
    attributes:
      label: Session ID (optional)
      placeholder: "123e4567-e89b-12d3-a456-426614174000"
    validations:
      required: false

  - type: input
    id: project_id
    attributes:
      label: Project ID (optional)
      placeholder: "proj_abc123"
    validations:
      required: false

  - type: input
    id: request_id
    attributes:
      label: Request ID (optional)
      description: From API error messages or response headers (`dg-request-id`)
      placeholder: "req_def456"
    validations:
      required: false

  - type: checkboxes
    id: conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
